<?xml version="1.0" standalone="no"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 20010904//EN"
        "http://www.w3.org/TR/2001/REC-SVG-20010904/DTD/svg10.dtd">
<svg version="1.0" xmlns="http://www.w3.org/2000/svg"
     width="1024.000000pt" height="1024.000000pt" viewBox="0 0 1024.000000 1024.000000"
     preserveAspectRatio="xMidYMid meet">

    <defs>
        <!-- 增强光效滤镜：更强烈的外发光 -->
        <filter id="enhanceGlow" x="-0.4" y="-0.4" width="1.8" height="1.8">
            <!-- 外发光层1：柔和光晕 -->
            <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="glowBlur1"/>
            <feComponentTransfer in="glowBlur1" result="glow1">
                <feFuncR type="linear" slope="0.85" intercept="0.7"/>
                <feFuncG type="linear" slope="0.75" intercept="0.5"/>
                <feFuncB type="linear" slope="0.6" intercept="0.4"/>
                <feFuncA type="linear" slope="0.5" intercept="0"/>
            </feComponentTransfer>

            <!-- 外发光层2：中等光晕，香槟色调 -->
            <feGaussianBlur in="SourceAlpha" stdDeviation="12" result="glowBlur2"/>
            <feComponentTransfer in="glowBlur2" result="glow2">
                <feFuncR type="linear" slope="0.8" intercept="0.7"/>
                <feFuncG type="linear" slope="0.75" intercept="0.55"/>
                <feFuncB type="linear" slope="0.65" intercept="0.45"/>
                <feFuncA type="linear" slope="0.4" intercept="0"/>
            </feComponentTransfer>

            <!-- 阴影：增加立体感 -->
            <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
            <feOffset in="blur" dx="5" dy="5" result="offsetBlur"/>
            <feComponentTransfer in="offsetBlur" result="shadow">
                <feFuncA type="linear" slope="0.45" intercept="0"/>
            </feComponentTransfer>

            <!-- 合并所有光效层 -->
            <feMerge result="mergedGlow">
                <feMergeNode in="shadow"/>
                <feMergeNode in="glow1"/>
                <feMergeNode in="glow2"/>
            </feMerge>

            <feComposite in="SourceGraphic" in2="mergedGlow" operator="over"/>
        </filter>

        <!-- 辅助滤镜：增强边缘锐利度 -->
        <filter id="enhanceSharpness" x="-0.1" y="-0.1" width="1.2" height="1.2">
            <feConvolveMatrix order="3" kernelMatrix="0 -1 0 -1 5 -1 0 -1 0" result="sharpened"/>
            <feComposite in="SourceGraphic" in2="sharpened" operator="over"/>
        </filter>

        <!-- 香槟浅金色渐变：中心更深更暖，向外渐变成柔和香槟色，增强中心主体 -->
        <radialGradient id="champagneGoldGradient" cx="48%" cy="48%" r="52%" fx="45%" fy="45%">
            <!-- 中心更深更暖的金色，突出主体，向外渐变到柔和香槟色 -->
            <stop offset="0%" stop-color="#e8c48a" stop-opacity="1"/>
            <stop offset="15%" stop-color="#e0bc7a" stop-opacity="1"/>
            <stop offset="35%" stop-color="#d6b06a" stop-opacity="0.95"/>
            <stop offset="60%" stop-color="#c8a560" stop-opacity="0.85"/>
            <stop offset="80%" stop-color="#b89258" stop-opacity="0.75"/>
            <stop offset="100%" stop-color="#a27e4a" stop-opacity="0.7"/>
        </radialGradient>

        <!-- 内部高光增强：深金色光晕，增加中心区域的光泽感 -->
        <radialGradient id="innerChampagneGlow" cx="40%" cy="40%" r="48%">
            <stop offset="0%" stop-color="#f5d89c" stop-opacity="0.55"/>
            <stop offset="35%" stop-color="#e8c88a" stop-opacity="0.35"/>
            <stop offset="70%" stop-color="#d6b072" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#c0985a" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- 背景完全透明 -->

